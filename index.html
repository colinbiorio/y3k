<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>orion by y3k</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Three.js + addons resolved as bare specifiers via the import map below. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="gated">
  <div id="stage"></div>

  <!-- Entrance / login — the live orb glows behind a frosted jewel card. -->
  <div id="login" class="login" role="dialog" aria-modal="true" aria-label="Enter orion">
    <div class="login-aura" aria-hidden="true"></div>
    <form id="login-form" class="login-card" autocomplete="on">
      <img class="login-logo" src="cursive.png" alt="orion by y3k" />
      <p class="login-tag">who are you?</p>
      <label class="login-field"><input id="login-email" type="email" placeholder="email" autocomplete="email" spellcheck="false" /></label>
      <label class="login-field"><input id="login-pass" type="password" placeholder="password" autocomplete="current-password" /></label>
      <button type="submit" class="login-enter" aria-label="Enter"><img class="univi" src="univi.png" alt="" /></button>
      <button type="button" id="login-skip" class="login-alt">or remain mysterious…</button>
    </form>
    <div class="login-flash" aria-hidden="true"></div>
  </div>

  <header id="hud-top">
    <img class="brand" src="cursive.png" alt="orion by y3k" />
    <span id="mood-tag" class="mood-tag">orion | calm</span>
  </header>

  <button id="gear" class="gear" aria-label="Settings" title="Settings">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
  </button>

  <video id="cam" playsinline muted></video>

  <div id="caption" class="caption"></div>

  <footer id="hud-bottom">
    <button id="mic" class="round" title="Talk (toggle microphone)" aria-label="Microphone">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
    </button>

    <form id="say-form" class="say">
      <input id="say" type="text" autocomplete="off" />
    </form>

    <button id="camera" class="round" title="Toggle camera" aria-label="Camera">
      <svg viewBox="0 0 24 24" width="22" height="22"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4Z"/></svg>
    </button>
  </footer>

  <div id="settings" class="modal" hidden>
    <div class="sheet">
      <div class="sheet-head"><span>Settings</span><button id="settings-close" class="x" aria-label="Close">✕</button></div>
      <div class="sheet-body" id="settings-body"></div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
